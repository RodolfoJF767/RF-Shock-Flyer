<!-- Define o tipo de documento como HTML5 -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- FORÇA O MODO DESKTOP -->
    <meta name="viewport" content="width=1280">
    <title>RF-Shock Flyer | Loja Oficial</title>

    <link rel="icon" href="https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --vermelho: #ff0000;         
            --verde-neon: #00ff00;       
            --amarelo: #ffff00;          
            --rosa-neon: #ff00ff;        
            --laranja-neon: #ff8c00;     
            --azul-escuro-navy: #000050; 
            --preto: #000000;            
            --fundo-card: #0d0d0d;       
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--preto);
            color: #ffffff;
            margin: 0; padding: 0;
            text-align: center;
            min-width: 1280px;
            padding-bottom: 220px;
        }

        header {
            background: #000;
            padding: 20px;
            border-bottom: 3px solid var(--vermelho);
        }

        .logo-img {
            width: 250px;
            filter: drop-shadow(0 0 10px var(--verde-neon));
        }

        .banner-unico-container {
            width: 1240px;
            margin: 20px auto;
            border: 5px solid var(--verde-neon);
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
            overflow: hidden;
            line-height: 0;
        }

        .banner-img { width: 100%; height: auto; display: block; }

        .tabs-nav {
            display: flex; justify-content: center;
            background: #111; padding: 20px;
            position: sticky; top: 0; z-index: 900;
            gap: 15px;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--verde-neon);
            color: var(--verde-neon);
            padding: 12px 22px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer; font-size: 16px;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--verde-neon);
            color: #000;
            box-shadow: 0 0 20px var(--verde-neon);
        }

        .tab-contact { background-color: var(--azul-escuro-navy) !important; color: var(--amarelo) !important; border: 2px solid var(--amarelo) !important; }

        .container {
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            width: 1240px; margin: 30px auto;
            padding: 10px;
        }

        .product-card { display: none; }
        .product-card.show { display: block; }

        .card {
            background: var(--fundo-card);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 15px;
            transition: 0.4s;
            cursor: pointer;
            display: flex; flex-direction: column;
            height: 100%;
        }

        .card:hover { border-color: var(--vermelho); box-shadow: 0 0 25px rgba(255, 0, 0, 0.5); }

        .product-gif {
            width: 100%; aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 30px;
            background-color: #fff;
            border: 1px solid #333;
        }

        .card h3 { color: var(--amarelo); font-size: 18px; margin: 12px 0 5px 0; min-height: 40px;}
        .card .description { font-size: 14px; color: #fff; margin-bottom: 10px; min-height: 35px;}
        .price { display: block; font-size: 28px; color: var(--verde-neon); margin-bottom: 15px; }

        .btn-style {
            text-decoration: none; display: block; height: 45px; line-height: 45px;
            border-radius: 8px; font-weight: bold; text-transform: uppercase;
            font-size: 11px; border: none; cursor: pointer; width: 100%; margin-bottom: 5px;
        }

        .btn-pay { background-color: var(--rosa-neon); color: #000; } 
        .btn-add { background-color: var(--laranja-neon); color: #000; } 

        /* TEXTO DO RODAPÉ EM 40PX */
        footer { 
            background: #0a0a0a; padding: 60px 20px; 
            border-top: 4px solid var(--vermelho); margin-top: 40px; 
        }
        footer p {
            font-size: 40px; font-weight: bold; 
            color: #ffffff; text-transform: uppercase; margin-top: 20px;
        }
        .footer-gif { width: 300px; border-radius: 20px; border: 3px solid var(--verde-neon); }

        #product-detail-view {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; overflow-y: auto; padding: 50px 0;
        }
        .detail-content {
            width: 1000px; margin: auto; background: #0d0d0d; border: 3px solid var(--verde-neon);
            border-radius: 40px; padding: 50px; display: flex; flex-direction: column; align-items: center; position: relative;
        }
        .detail-img { width: 500px; height: 500px; object-fit: contain; background: #fff; border-radius: 30px; border: 4px solid var(--verde-neon); margin-bottom: 30px;}

        #cart-icon {
            position: fixed; bottom: 30px; left: 30px; background: var(--verde-neon); color: #000;
            width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 70px; cursor: pointer; z-index: 2500; box-shadow: 0 0 50px var(--verde-neon); border: 6px solid #000;
        }
        #cart-count { position: absolute; top: 5px; right: 5px; background: var(--vermelho); color: #fff; width: 45px; height: 45px; border-radius: 50%; font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 3px solid #000; }
    </style>
</head>
<body>

        function carregarProdutos() {
            const grid = document.getElementById('gridLoja');
            produtosLoja.forEach(p => {
                const div = document.createElement('div');
                div.className = `product-card ${p.cat} ${p.cat === 'aero' ? 'show' : ''}`;
                div.innerHTML = `
                    <div class="card" onclick="abrirDetalhes('${p.nome}', '${p.desc}', ${p.preco}, '${p.img}')">
                        <img src="${p.img}" class="product-gif">
                        <h3>${p.nome}</h3>
                        <p class="description">${p.desc}</p>
                        <span class="price">R$ ${p.preco},00</span>
                        <div onclick="event.stopPropagation()">
                            <button class="btn-style btn-pay" onclick="window.open('https://mpago.la/1iP5Scn', '_system')">🛒 PAGAR AGORA</button>
                            <button class="btn-style btn-add" onclick="adicionarCarrinho('${p.nome}', ${p.preco})">➕ ADD AO CARRINHO</button>
                        </div>
                    </div>
                `;
                // MUDANÇA AQUI: appendChild para manter a ordem da lista
                grid.appendChild(div);
            });
        }

        function switchTab(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.remove('show');
                if(card.classList.contains(cat)) card.classList.add('show');
            });
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        function abrirDetalhes(n, d, p, i) {
            document.getElementById('det-title').innerText = n;
            document.getElementById('det-desc').innerText = d;
            document.getElementById('det-price').innerText = `R$ ${p},00`;
            document.getElementById('det-img').src = i;
            document.getElementById('product-detail-view').style.display = 'block';
        }

        function fecharDetalhes() { document.getElementById('product-detail-view').style.display = 'none'; }

        let itens = 0;
        function adicionarCarrinho(nome, preco) {
            itens++;
            document.getElementById('cart-count').innerText = itens;
            alert(nome + " adicionado ao carrinho!");
        }

        carregarProdutos();
    </script>
</body>
</html>
