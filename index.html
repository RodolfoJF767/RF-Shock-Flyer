<!-- Declaração de documento HTML5 -->
<!DOCTYPE html>
<!-- Início do HTML com definição de idioma Português do Brasil -->
<html lang="pt-br">
<head>
    <!-- Define a codificação universal para evitar erros de acentos -->
    <meta charset="UTF-8">
    
    <!-- FORÇA O MODO DESKTOP: Define que o navegador deve simular uma tela de 1280px de largura -->
    <meta name="viewport" content="width=1280, initial-scale=1">
    
    <!-- Título da página que aparece no navegador -->
    <title>RF-Shock Flyer | Loja Oficial</title>
    
    <!-- Favicon vindo do seu GitHub -->
    <link rel="icon" id="favicon-link" href="" type="image/x-icon">
    
    <!-- Importa a biblioteca de ícones FontAwesome para botões sociais -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Variáveis de cores neon */
        :root {
            --vermelho: #ff0000;
            --verde-neon: #00ff00;
            --amarelo: #ffff00;
            --preto: #000000;
            --fundo-card: #0d0d0d;
        }

        /* Configurações do corpo da página */
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--preto);
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            min-width: 1280px; /* Garante que o layout não encolha */
        }

        /* Cabeçalho da loja */
        header {
            background: #000;
            padding: 20px;
            border-bottom: 3px solid var(--vermelho);
        }

        /* Estilo da imagem da Logomarca */
        .logo-img {
            width: 150px;
            filter: drop-shadow(0 0 10px var(--verde-neon));
        }

        /* Banner Hero (Topo) */
        .banner-hero {
            width: 1280px;
            height: 350px;
            margin: 0 auto;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid var(--amarelo);
        }

        .banner-hero h2 {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            color: var(--amarelo);
            font-size: 40px;
            border: 3px solid var(--verde-neon);
            text-transform: uppercase;
        }

        /* Barra de Abas / Categorias */
        .tabs-nav {
            display: flex;
            justify-content: center;
            background: #111;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 15px;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--verde-neon);
            color: var(--verde-neon);
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--verde-neon);
            color: #000;
            box-shadow: 0 0 20px var(--verde-neon);
        }

        /* Grade de Produtos (4 por linha) */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            width: 1240px;
            margin: 40px auto;
            padding: 20px;
        }

        .product-card { display: none; }
        .product-card.show { display: block; }

        /* Card individual do produto */
        .card {
            background: var(--fundo-card);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--vermelho);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        .product-gif {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            background-color: #fff;
        }

        .card h3 {
            color: var(--amarelo);
            font-size: 22px;
            margin: 20px 0;
            height: 50px;
            overflow: hidden;
        }

        .price {
            display: block;
            font-size: 35px;
            color: var(--verde-neon);
            margin-bottom: 25px;
        }

        /* Botão de Compra */
        .btn-mp {
            background: var(--vermelho);
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* Botão WhatsApp */
        .btn-wa {
            background: #25d366;
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* Rodapé */
        footer {
            background: #0a0a0a;
            padding: 60px 20px;
            border-top: 4px solid var(--vermelho);
            margin-top: 100px;
        }

        .footer-gif {
            width: 800px;
            border-radius: 20px;
            border: 3px solid var(--verde-neon);
            margin-bottom: 40px;
        }

        .mp-logo {
            width: 350px;
        }
    </style>
</head>
<body>

    <script>
        /* CONFIGURAÇÃO DO REPOSITÓRIO GITHUB */
        /* Note que usamos 'raw.githubusercontent.com' e o caminho correto da pasta 'imagens' */
        const URL_BASE = "https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/"; 
        
        /* Carregamento das imagens fixas assim que a página abre */
        window.onload = function() {
            document.getElementById('img-logo').src = URL_BASE + "logo.png";
            document.getElementById('banner-top').style.backgroundImage = "url('" + URL_BASE + "banner.gif')";
            document.getElementById('img-rodape').src = URL_BASE + "rodape.gif";
            document.getElementById('favicon-link').href = URL_BASE + "favicon.ico";
        };
    </script>

    <!-- Cabeçalho -->
    <header>
        <img id="img-logo" src="" alt="Logo" class="logo-img">
        <h1 style="color: var(--verde-neon); margin: 10px 0 0 0; font-size: 30px;">RF-SHOCK FLYER</h1>
    </header>

    <!-- Banner Principal -->
    <div id="banner-top" class="banner-hero">
        <h2>🚀 PRONTA ENTREGA - ENVIO PARA TODO BRASIL 🚀</h2>
    </div>

    <!-- Menu de Abas -->
    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('aero', this)">Aeromodelos</button>
        <button class="tab-btn" onclick="switchTab('drones', this)">Drones</button>
        <button class="tab-btn" onclick="switchTab('eletronicos', this)">Eletrônicos</button>
        <button class="tab-btn" onclick="switchTab('pecas', this)">Peças & Hélices</button>
        <button class="tab-btn" onclick="switchTab('smart', this)">Smartwatches</button>
    </nav>

    <!-- Área de Produtos -->
    <div class="container" id="gridLoja">
        <script>
            const categorias = ['aero', 'drones', 'eletronicos', 'pecas', 'smart'];
            const gridLoja = document.getElementById('gridLoja');

            categorias.forEach(cat => {
                for(let i = 1; i <= 15; i++) {
                    let n = i < 10 ? '0' + i : i;
                    let activeClass = cat === 'aero' ? 'show' : '';

                    let card = `
                    <div class="product-card ${cat} ${activeClass}">
                        <div class="card">
                            <img src="${URL_BASE}p${n}_${cat}.gif" class="product-gif" alt="Produto">
                            <h3>Produto ${n} - ${cat.toUpperCase()}</h3>
                            <span class="price">R$ 350,00</span>
                            <a href="SUA_URL_DO_MERCADO_PAGO" target="_blank" class="btn-mp">🛒 COMPRAR NO MERCADO PAGO</a>
                            <a href="https://wa.me/5532920006774?text=Tenho+interesse+no+p${n}_${cat}" class="btn-wa">
                                <i class="fab fa-whatsapp"></i> SUPORTE TÉCNICO
                            </a>
                        </div>
                    </div>`;
                    gridLoja.innerHTML += card;
                }
            });
        </script>
    </div>

    <!-- Rodapé -->
    <footer>
        <img id="img-rodape" src="" alt="Destaque" class="footer-gif">
        <p style="color: var(--amarelo); font-size: 24px; margin-bottom: 20px;">PAGAMENTO 100% SEGURO</p>
        <img src="https://logospng.org/download/mercado-pago/logo-mercado-pago-2048.png" alt="Mercado Pago" class="mp-logo">
        <p style="font-size: 18px; margin-top: 30px; color: #888;">RF-Shock Flyer © 2024 | Versão Desktop Store</p>
    </footer>

    <!-- Lógica de funcionamento das abas -->
    <script>
        function switchTab(categoryId, element) {
            const cards = document.querySelectorAll('.product-card');
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            cards.forEach(card => {
                if (card.classList.contains(categoryId)) {
                    card.classList.add('show');
                } else {
                    card.classList.remove('show');
                }
            });
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }
    </script>
</body>
</html>
