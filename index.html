<!-- Declaração de documento HTML5 -->
<!DOCTYPE html>
<!-- Início do HTML com definição de idioma Português do Brasil -->
<html lang="pt-br">
<head>
    <!-- Define a codificação de caracteres Universal -->
    <meta charset="UTF-8">
    
    <!-- ATENÇÃO: Esta linha abaixo é o segredo para abrir como no Computador -->
    <!-- Em vez de "device-width", fixamos em 1280px para forçar o layout de PC -->
    <meta name="viewport" content="width=1280, initial-scale=1">
    
    <!-- Título da página -->
    <title>RF-Shock Flyer | Loja Oficial</title>
    <!-- Link para o Favicon na sua pasta de imagens do projeto Cordova -->
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <!-- Importação da biblioteca de ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Variáveis de cores neon */
        :root {
            --vermelho: #ff0000;
            --verde-neon: #00ff00;
            --amarelo: #ffff00;
            --preto: #000000;
            --fundo-card: #0d0d0d;
        }

        /* Estilos gerais */
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--preto);
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            /* Fixamos a largura mínima para garantir que não quebre no celular */
            min-width: 1280px; 
        }

        /* Cabeçalho fixo em largura de desktop */
        header {
            background: #000;
            padding: 30px;
            border-bottom: 3px solid var(--vermelho);
            width: 100%;
            box-sizing: border-box;
        }

        .logo-img {
            width: 150px; /* Logo maior estilo desktop */
            filter: drop-shadow(0 0 10px var(--verde-neon));
        }

        /* Banner Hero Largo */
        .banner-hero {
            width: 1280px;
            height: 350px;
            margin: 0 auto;
            background-image: url('img/banner.gif');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid var(--amarelo);
        }

        .banner-hero h2 {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            color: var(--amarelo);
            font-size: 40px; /* Fonte grande de PC */
            border: 3px solid var(--verde-neon);
            text-transform: uppercase;
        }

        /* Menu de Navegação por Abas (Estilo Barra Superior de PC) */
        .tabs-nav {
            display: flex;
            justify-content: center;
            background: #111;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--verde-neon);
            color: var(--verde-neon);
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--verde-neon);
            color: #000;
            box-shadow: 0 0 20px var(--verde-neon);
        }

        /* Grade de Produtos Fixa (4 produtos por linha como no PC) */
        .container {
            display: grid;
            /* Força exatamente 4 colunas fixas */
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            width: 1240px; /* Largura total da grade */
            margin: 40px auto;
            padding: 20px;
        }

        .product-card { display: none; }
        .product-card.show { display: block; }

        /* Card do Produto */
        .card {
            background: var(--fundo-card);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s;
            height: 100%; /* Garante altura igual na linha */
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--vermelho);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        /* GIF do Produto (1024x1024) */
        .product-gif {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            background-color: #fff;
        }

        .card h3 {
            color: var(--amarelo);
            font-size: 22px;
            margin: 20px 0;
            height: 60px; /* Fixa altura do título */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .price {
            display: block;
            font-size: 35px;
            color: var(--verde-neon);
            margin-bottom: 25px;
        }

        /* Botões */
        .btn-mp {
            background: var(--vermelho);
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 16px;
        }

        .btn-wa {
            background: #25d366;
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
        }

        /* Rodapé de Desktop */
        footer {
            background: #0a0a0a;
            padding: 60px 20px;
            border-top: 4px solid var(--vermelho);
            margin-top: 100px;
            width: 100%;
            box-sizing: border-box;
        }

        .footer-gif {
            width: 800px; /* GIF de rodapé grande para PC */
            border-radius: 20px;
            border: 3px solid var(--verde-neon);
            margin-bottom: 40px;
        }

        .mp-logo {
            width: 350px;
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <header>
        <img src="img/logo.png" alt="Logo RF" class="logo-img">
        <h1 style="color: var(--verde-neon); margin: 10px 0 0 0; font-size: 30px;">RF-SHOCK FLYER - DESKTOP STORE</h1>
    </header>

    <!-- Banner Principal -->
    <div class="banner-hero">
        <h2>🚀 VITRINE VIP - PRODUTOS À PRONTA ENTREGA 🚀</h2>
    </div>

    <!-- Abas de Categorias -->
    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('aero', this)">Aeromodelos</button>
        <button class="tab-btn" onclick="switchTab('drones', this)">Drones</button>
        <button class="tab-btn" onclick="switchTab('eletronicos', this)">Eletrônicos</button>
        <button class="tab-btn" onclick="switchTab('pecas', this)">Peças & Hélices</button>
        <button class="tab-btn" onclick="switchTab('smart', this)">Smartwatches</button>
    </nav>

    <!-- Loja -->
    <div class="container" id="gridLoja">
        
        <script>
            // Categorias da Loja
            const categorias = ['aero', 'drones', 'eletronicos', 'pecas', 'smart'];
            const gridLoja = document.getElementById('gridLoja');

            // Gerador automático de 15 produtos por aba
            categorias.forEach(cat => {
                for(let i = 1; i <= 15; i++) {
                    let n = i < 10 ? '0' + i : i;
                    let activeClass = cat === 'aero' ? 'show' : '';

                    let card = `
                    <div class="product-card ${cat} ${activeClass}">
                        <div class="card">
                            <img src="img/p${n}_${cat}.gif" class="product-gif" alt="GIF Produto">
                            <h3>Produto ${n} - ${cat.toUpperCase()}</h3>
                            <span class="price">R$ 499,00</span>
                            <a href="LINK_MERCADO_PAGO" class="btn-mp">🛒 COMPRAR NO MERCADO PAGO</a>
                            <a href="https://wa.me/5532920006774?text=Interesse+no+p${n}_${cat}" class="btn-wa">
                                <i class="fab fa-whatsapp"></i> SUPORTE TÉCNICO
                            </a>
                        </div>
                    </div>`;
                    gridLoja.innerHTML += card;
                }
            });
        </script>

    </div>

    <!-- Rodapé -->
    <footer>
        <!-- Seu GIF de rodapé -->
        <img src="img/rodape.gif" alt="Animação Rodapé" class="footer-gif">
        
        <p style="color: var(--amarelo); font-size: 24px; margin-bottom: 20px;">PAGAMENTO 100% SEGURO</p>
        <img src="https://logospng.org/download/mercado-pago/logo-mercado-pago-2048.png" alt="Mercado Pago" class="mp-logo">
        
        <p style="font-size: 18px; margin-top: 30px; color: #888;">RF-Shock Flyer © 2024 | Versão Desktop Forçada</p>
    </footer>

    <!-- Lógica das Abas -->
    <script>
        function switchTab(categoryId, element) {
            const cards = document.querySelectorAll('.product-card');
            const buttons = document.querySelectorAll('.tab-btn');

            // Muda estado dos botões
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // Filtra produtos
            cards.forEach(card => {
                if (card.classList.contains(categoryId)) {
                    card.classList.add('show');
                } else {
                    card.classList.remove('show');
                }
            });

            // Sobe para o topo da loja ao trocar de aba
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }
    </script>

</body>
</html>
