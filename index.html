<!-- Declaração de documento HTML5 -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Força visualização de Desktop (1280px) -->
    <meta name="viewport" content="width=1280, initial-scale=1">
    
    <title>RF-Shock Flyer | Loja Oficial</title>
    
    <!-- FAVICON: Ajustado para a pasta "imagens" -->
    <link rel="icon" href="imagens/favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --vermelho: #ff0000;
            --verde-neon: #00ff00;
            --amarelo: #ffff00;
            --preto: #000000;
            --fundo-card: #0d0d0d;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--preto);
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            min-width: 1280px; 
        }

        header {
            background: #000;
            padding: 30px;
            border-bottom: 3px solid var(--vermelho);
        }

        .logo-img {
            width: 150px;
            filter: drop-shadow(0 0 10px var(--verde-neon));
        }

        .banner-hero {
            width: 1280px;
            height: 350px;
            margin: 0 auto;
            /* CAMINHO AJUSTADO PARA "imagens" */
            background-image: url('imagens/banner.gif');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid var(--amarelo);
        }

        .banner-hero h2 {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            color: var(--amarelo);
            font-size: 40px;
            border: 3px solid var(--verde-neon);
            text-transform: uppercase;
        }

        .tabs-nav {
            display: flex;
            justify-content: center;
            background: #111;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 15px;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--verde-neon);
            color: var(--verde-neon);
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--verde-neon);
            color: #000;
            box-shadow: 0 0 20px var(--verde-neon);
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            width: 1240px;
            margin: 40px auto;
            padding: 20px;
        }

        .product-card { display: none; }
        .product-card.show { display: block; }

        .card {
            background: var(--fundo-card);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s;
        }

        .product-gif {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            background-color: #111;
        }

        .price {
            display: block;
            font-size: 30px;
            color: var(--verde-neon);
            margin: 15px 0;
        }

        .btn-mp {
            background: var(--vermelho);
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-wa {
            background: #25d366;
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        footer {
            background: #0a0a0a;
            padding: 60px 20px;
            border-top: 4px solid var(--vermelho);
            margin-top: 100px;
        }

        .footer-gif {
            width: 800px;
            border: 3px solid var(--verde-neon);
            margin-bottom: 30px;
        }

        .mp-logo { width: 300px; }
    </style>
</head>
<body>

    <header>
        <!-- LOGO AJUSTADA -->
        <img src="imagens/logo.png" alt="Logo RF" class="logo-img">
        <h1 style="color: var(--verde-neon); margin-top: 10px;">RF-SHOCK FLYER STORE</h1>
    </header>

    <div class="banner-hero">
        <h2>🚀 VITRINE EXCLUSIVA 🚀</h2>
    </div>

    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('aero', this)">Aeromodelos</button>
        <button class="tab-btn" onclick="switchTab('drones', this)">Drones</button>
        <button class="tab-btn" onclick="switchTab('eletronicos', this)">Eletrônicos</button>
        <button class="tab-btn" onclick="switchTab('pecas', this)">Peças</button>
        <button class="tab-btn" onclick="switchTab('smart', this)">Smartwatches</button>
    </nav>

    <div class="container" id="gridLoja"></div>

    <footer>
        <!-- RODAPÉ AJUSTADO -->
        <img src="imagens/rodape.gif" alt="Rodapé" class="footer-gif">
        <br>
        <img src="https://logospng.org/download/mercado-pago/logo-mercado-pago-2048.png" alt="Mercado Pago" class="mp-logo">
        <p>© 2024 RF-Shock Flyer | Desktop Version</p>
    </footer>

    <script>
        const categorias = ['aero', 'drones', 'eletronicos', 'pecas', 'smart'];
        const gridLoja = document.getElementById('gridLoja');

        categorias.forEach(cat => {
            for(let i = 1; i <= 15; i++) {
                let n = i < 10 ? '0' + i : i;
                let activeClass = cat === 'aero' ? 'show' : '';
                
                // CAMINHO DA IMAGEM DO PRODUTO AJUSTADO PARA "imagens"
                let card = `
                <div class="product-card ${cat} ${activeClass}">
                    <div class="card">
                        <img src="imagens/p${n}_${cat}.gif" class="product-gif" alt="Produto">
                        <h3>Produto ${n} - ${cat.toUpperCase()}</h3>
                        <span class="price">R$ 499,00</span>
                        <a href="#" class="btn-mp">🛒 COMPRAR AGORA</a>
                        <a href="https://wa.me/5532920006774" class="btn-wa">
                            <i class="fab fa-whatsapp"></i> SUPORTE
                        </a>
                    </div>
                </div>`;
                gridLoja.innerHTML += card;
            }
        });

        function switchTab(categoryId, element) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            document.querySelectorAll('.product-card').forEach(card => {
                card.classList.contains(categoryId) ? card.classList.add('show') : card.classList.remove('show');
            });
            window.scrollTo({ top: 450, behavior: 'smooth' });
        }
    </script>
</body>
</html>
