<!-- Define o documento como HTML5 -->
<!DOCTYPE html>
<!-- Define o idioma oficial como Português do Brasil -->
<html lang="pt-br">
<head>
    <!-- Define a codificação para evitar erros de acentos -->
    <meta charset="UTF-8">
    <!-- FORÇA O MODO DESKTOP: Simula uma tela de computador com 1280px de largura no celular -->
    <meta name="viewport" content="width=1280, initial-scale=1">
    <!-- Título da página -->
    <title>RF-Shock Flyer | Loja Oficial</title>
    <!-- Link para o Favicon vindo do seu GitHub -->
    <link rel="icon" href="https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/favicon.ico" type="image/x-icon">
    <!-- Importa biblioteca de ícones FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Variáveis de cores para o tema Neon */
        :root {
            --vermelho: #ff0000;         /* Cor padrão dos botões de compra */
            --verde-neon: #00ff00;       /* Verde fluorescente das abas */
            --amarelo: #ffff00;          /* Amarelo Neon */
            --azul-escuro: #000050;      /* Azul Escuro Marinho da Aba de Contato */
            --preto: #000000;            /* Fundo total do site */
            --fundo-card: #0d0d0d;       /* Fundo interno dos cards */
        }

        /* Estilo geral */
        body {
            font-family: 'Arial Black', sans-serif; 
            background-color: var(--preto);
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
            min-width: 1280px;            /* Fixa a largura em 1280px */
        }

        /* Cabeçalho */
        header {
            background: #000;
            padding: 20px;
            border-bottom: 3px solid var(--vermelho);
        }

        .logo-img {
            width: 150px;
            filter: drop-shadow(0 0 10px var(--verde-neon));
        }

        /* Banner Hero */
        .banner-hero {
            width: 1280px;
            height: 350px;
            margin: 0 auto;
            background-image: url('https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/banner.gif');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid var(--amarelo);
        }

        .banner-hero h2 {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            color: var(--amarelo);
            font-size: 40px;
            border: 3px solid var(--verde-neon);
            text-transform: uppercase;
        }

        /* Menu de Abas */
        .tabs-nav {
            display: flex;
            justify-content: center;
            background: #111;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 900;
            gap: 15px;
        }

        .tab-btn {
            background: none;
            border: 2px solid var(--verde-neon);
            color: var(--verde-neon);
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--verde-neon);
            color: #000;
            box-shadow: 0 0 20px var(--verde-neon);
        }

        /* ABA CONTATO ESPECIAL */
        .tab-contact {
            background-color: var(--azul-escuro) !important;
            color: var(--amarelo) !important;
            border: 2px solid var(--amarelo) !important;
        }

        /* Grade de Produtos */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 30px;
            width: 1240px;
            margin: 40px auto;
            padding: 20px;
        }

        .product-card { display: none !important; }
        .product-card.show { display: block !important; }

        /* Card do Produto */
        .card {
            background: var(--fundo-card);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--vermelho);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        .product-gif {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            background-color: #fff;
        }

        .price {
            display: block;
            font-size: 30px;
            color: var(--verde-neon);
            margin: 15px 0;
        }

        /* Botões */
        .btn-action {
            background: var(--vermelho);
            color: #fff;
            text-decoration: none;
            display: block;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
        }

        /* --- CARRINHO FLUTUANTE --- */
        #cart-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--verde-neon);
            color: #000;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 0 20px var(--verde-neon);
            transition: 0.3s;
        }

        #cart-count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--vermelho);
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Janela do Carrinho (Modal) */
        #cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background: #111;
            width: 600px;
            max-height: 80vh;
            border: 3px solid var(--verde-neon);
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding: 10px 0;
        }

        .close-cart {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            color: var(--vermelho);
            cursor: pointer;
        }

        /* --- SEÇÃO DE CONTATO CENTRALIZADA --- */
        .contato-wrapper.show {
            grid-column: 1 / 5;
            display: flex !important;
            justify-content: center;
            padding: 50px 0;
        }

        .contact-box-center {
            width: 1000px;
            background: #000;
            border: 5px solid var(--azul-escuro);
            padding: 60px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-leaf {
            width: 400px;
            height: 400px;
            object-fit: cover;
            border: 8px solid var(--amarelo);
            border-radius: 40px 200px 40px 200px;
            margin-bottom: 30px;
        }

        .btn-wa-neon {
            background-color: var(--verde-neon);
            color: #000;
            padding: 20px 60px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 25px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Rodapé */
        footer {
            background: #0a0a0a;
            padding: 60px 20px;
            border-top: 4px solid var(--vermelho);
            margin-top: 100px;
        }

        .footer-gif {
            width: 800px;
            border-radius: 20px;
            border: 3px solid var(--verde-neon);
            margin-bottom: 40px;
        }

        .mp-badge { width: 350px; }
    </style>
</head>
<body>

    <!-- URL Base GitHub -->
    <script>
        const URL_BASE = "https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/";
        let carrinho = [];
    </script>

    <!-- Header -->
    <header>
        <img src="https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/logo.png" alt="Logo" class="logo-img">
        <h1 style="color: var(--verde-neon); margin: 0; font-size: 30px;">RF-SHOCK FLYER</h1>
    </header>

    <!-- Banner -->
    <div class="banner-hero">
        <h2>🚀 CARRINHO DE COMPRAS ATIVADO - APROVEITE! 🚀</h2>
    </div>

    <!-- Abas -->
    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('aero', this)">Aeromodelos</button>
        <button class="tab-btn" onclick="switchTab('drones', this)">Drones</button>
        <button class="tab-btn" onclick="switchTab('eletronicos', this)">Eletrônicos</button>
        <button class="tab-btn" onclick="switchTab('pecas', this)">Peças & Hélices</button>
        <button class="tab-btn" onclick="switchTab('smart', this)">Smartwatches</button>
        <button class="tab-btn tab-contact" onclick="switchTab('contato', this)">Contato Vendedor</button>
    </nav>

    <!-- Container da Loja -->
    <div class="container" id="gridLoja">
        <script>
            const categorias = ['aero', 'drones', 'eletronicos', 'pecas', 'smart'];
            const gridLoja = document.getElementById('gridLoja');

            categorias.forEach(cat => {
                for(let i = 1; i <= 15; i++) {
                    let n = i < 10 ? '0' + i : i;
                    let activeClass = cat === 'aero' ? 'show' : '';
                    let preco = 250 + (i * 10); // Preço ilustrativo

                    let card = `
                    <div class="product-card ${cat} ${activeClass}">
                        <div class="card">
                            <img src="${URL_BASE}p${n}_${cat}.gif" class="product-gif" alt="Produto">
                            <h3>Produto ${n} - ${cat.toUpperCase()}</h3>
                            <span class="price">R$ ${preco},00</span>
                            <button class="btn-action" onclick="addNoCarrinho('Produto ${n} ${cat}', ${preco})">🛒 ADICIONAR AO CARRINHO</button>
                            <a href="https://wa.me/5532920006774" target="_blank" class="btn-action" style="background:#25d366;">DÚVIDAS</a>
                        </div>
                    </div>`;
                    gridLoja.innerHTML += card;
                }
            });
        </script>

        <!-- ABA CONTATO -->
        <div class="product-card contato contato-wrapper">
            <div class="contact-box-center">
                <img src="https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/logo.png" class="photo-leaf" alt="Vendedor">
                <h2>RODOLFO FRANCO</h2>
                <p>Olá! Adicione seus produtos ao carrinho e finalize o pedido para receber o link de pagamento do Mercado Pago direto no seu WhatsApp!</p>
                <a href="https://wa.me/5532920006774" target="_blank" class="btn-wa-neon">Falar com Rodolfo</a>
            </div>
        </div>
    </div>

    <!-- ÍCONE FLUTUANTE DO CARRINHO -->
    <div id="cart-icon" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <div id="cart-count">0</div>
    </div>

    <!-- JANELA DO CARRINHO -->
    <div id="cart-modal">
        <div class="cart-content">
            <span class="close-cart" onclick="toggleCart()">&times;</span>
            <h2 style="color: var(--verde-neon)">SEU CARRINHO</h2>
            <div id="cart-items-list">
                <!-- Itens entram aqui -->
            </div>
            <hr>
            <h3 style="font-size: 25px;">TOTAL: <span id="cart-total" style="color: var(--verde-neon)">R$ 0,00</span></h3>
            <button class="btn-action" style="background: var(--verde-neon); color: #000; font-size: 20px;" onclick="finalizarPedido()">✅ FINALIZAR E PAGAR (MERCADO PAGO)</button>
            <button class="btn-action" style="background: #333;" onclick="limparCarrinho()">Limpar Carrinho</button>
        </div>
    </div>

    <!-- Rodapé -->
    <footer>
        <img src="https://raw.githubusercontent.com/RodolfoJF767/RF-Shock-Flyer/main/imagens/rodape.gif" alt="Destaque" class="footer-gif">
        <p>PAGAMENTO SEGURO VIA MERCADO PAGO</p>
        <img src="https://logospng.org/download/mercado-pago/logo-mercado-pago-2048.png" alt="Mercado Pago" class="mp-logo">
    </footer>

    <!-- Scripts de Lógica -->
    <script>
        // Função para mudar de aba
        function switchTab(categoryId, element) {
            const allItems = document.querySelectorAll('.product-card');
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            allItems.forEach(item => {
                item.classList.remove('show');
                if (item.classList.contains(categoryId)) item.classList.add('show');
            });
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        // Adicionar ao carrinho
        function addNoCarrinho(nome, preco) {
            carrinho.push({nome, preco});
            atualizarCarrinho();
            alert(nome + " adicionado!");
        }

        // Atualiza visual do carrinho
        function atualizarCarrinho() {
            const list = document.getElementById('cart-items-list');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            list.innerHTML = "";
            let total = 0;

            carrinho.forEach((item, index) => {
                total += item.preco;
                list.innerHTML += `<div class="cart-item">
                    <span>${item.nome}</span>
                    <span>R$ ${item.preco},00</span>
                    <i class="fas fa-trash" onclick="removerItem(${index})" style="color:red; cursor:pointer"></i>
                </div>`;
            });

            totalEl.innerText = `R$ ${total},00`;
            countEl.innerText = carrinho.length;
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            atualizarCarrinho();
        }

        function limparCarrinho() {
            carrinho = [];
            atualizarCarrinho();
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // Finaliza enviando para o WhatsApp do vendedor
        function finalizarPedido() {
            if (carrinho.length === 0) return alert("O carrinho está vazio!");
            
            let msg = "🚀 *NOVO PEDIDO - RF SHOCK FLYER* 🚀\n\n";
            let total = 0;
            carrinho.forEach(i => {
                msg += `- ${i.nome}: R$ ${i.preco},00\n`;
                total += i.preco;
            });
            msg += `\n*TOTAL: R$ ${total},00*\n\nQuero o link do Mercado Pago para pagar!`;
            
            const url = `https://wa.me/5532920006774?text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
